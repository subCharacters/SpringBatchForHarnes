plugins {
    id 'java'
    id 'jacoco'  // JaCoCo 플러그인: 테스트 커버리지 측정
    id 'checkstyle'
    id 'com.github.spotbugs' version '6.1.11'
    id 'org.springframework.boot' version '4.0.5'
    id 'io.spring.dependency-management' version '1.1.7'
}

group = 'com.subcharacter'
version = '0.0.1-SNAPSHOT'
description = 'SpringBatchForHarnes'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.springframework.boot:spring-boot-h2console'
    implementation 'org.springframework.boot:spring-boot-starter-batch'
    implementation 'org.springframework.boot:spring-boot-starter-batch-jdbc'
    compileOnly 'org.projectlombok:lombok'
    runtimeOnly 'com.h2database:h2'
    annotationProcessor 'org.projectlombok:lombok'
    testImplementation 'org.springframework.boot:spring-boot-starter-batch-jdbc-test'
    testImplementation 'org.springframework.boot:spring-boot-starter-batch-test'
    testCompileOnly 'org.projectlombok:lombok'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    testAnnotationProcessor 'org.projectlombok:lombok'
}

// lombok.config 변경 시 컴파일 재실행 보장 (캐시 무효화)
tasks.named('compileJava') {
    inputs.file('lombok.config')
}

tasks.named('test') {
    useJUnitPlatform()
    outputs.upToDateWhen { false }       // 매 빌드마다 테스트 강제 실행 (캐시 우회)
    finalizedBy tasks.named('jacocoTestReport')  // 테스트 완료 후 커버리지 리포트 생성
}

// 커버리지 리포트 생성 (build/reports/jacoco/test/html)
tasks.named('jacocoTestReport') {
    finalizedBy tasks.named('jacocoTestCoverageVerification')  // 리포트 생성 후 기준 검증
    reports {
        xml.required = true   // CI 도구 연동용
        html.required = true  // 로컬 확인용
    }
    // 엔트리포인트와 Job 설정 클래스는 비즈니스 로직이 없으므로 측정 제외
    classDirectories.setFrom(
        fileTree(layout.buildDirectory.dir("classes/java/main")) {
            exclude '**/SpringBatchForHarnesApplication.java'
            exclude '**/job/**'
        }
    )
}

// 커버리지 기준 미달 시 빌드 실패 처리
tasks.named('jacocoTestCoverageVerification') {
    // 리포트와 동일한 대상 클래스로 검증 (설정 불일치 방지)
    classDirectories.setFrom(
        fileTree(layout.buildDirectory.dir("classes/java/main")) {
            exclude '**/SpringBatchForHarnesApplication.java'
            exclude '**/job/**'
            // 추가 가능: 필드만 있는 단순 DTO·도메인 클래스도 제외 — exclude '**/dto/**', exclude '**/domain/**'
        }
    )
    violationRules {
        rule {
            limit {
                counter = 'LINE'          // C0: 라인 커버리지 기준
                value = 'COVEREDRATIO'
                minimum = 0.80            // 80% 미만이면 빌드 실패
            }
            // 추가 가능: C1 브랜치 커버리지를 함께 검사하면 분기 누락까지 잡을 수 있음
            // limit {
            //     counter = 'BRANCH'
            //     value = 'COVEREDRATIO'
            //     minimum = 0.80
            // }
        }
    }
}

// Checkstyle: Google Java Style 규칙 적용
checkstyle {
    toolVersion = '13.4.0'
    configFile = file('config/checkstyle/google_checks.xml')
    showViolations = true
}

tasks.withType(Checkstyle).configureEach {
    exclude '**/SpringBatchForHarnesApplication.java'
    reports {
        xml.required = true
        html.required = true
    }
}

// SpotBugs: 정적 버그 분석 (HIGH/MEDIUM 빌드 실패, LOW 경고 후 통과)
// ignoreFailures=true 로 항상 리포트 생성 → spotbugs.sh 에서 레벨별 처리
spotbugs {
    toolVersion = '4.9.3'
    effort = 'max'
    reportLevel = 'low'  // LOW 이상 모두 탐지 (HIGH/MEDIUM/LOW)
    excludeFilter = file('config/spotbugs/exclude.xml')
    ignoreFailures = true
}

tasks.withType(com.github.spotbugs.snom.SpotBugsTask).configureEach {
    reports {
        xml.required = true
        html.required = true
    }
}

// Google Java Format: src/ 하위 모든 .java 파일 자동 포맷
tasks.register('googleJavaFormat', JavaExec) {
    classpath = files('libs/google-java-format-1.35.0-all-deps.jar')
    mainClass = 'com.google.googlejavaformat.java.Main'
    jvmArgs = [
        '--add-exports=jdk.compiler/com.sun.tools.javac.api=ALL-UNNAMED',
        '--add-exports=jdk.compiler/com.sun.tools.javac.code=ALL-UNNAMED',
        '--add-exports=jdk.compiler/com.sun.tools.javac.file=ALL-UNNAMED',
        '--add-exports=jdk.compiler/com.sun.tools.javac.parser=ALL-UNNAMED',
        '--add-exports=jdk.compiler/com.sun.tools.javac.tree=ALL-UNNAMED',
        '--add-exports=jdk.compiler/com.sun.tools.javac.util=ALL-UNNAMED',
    ]
    outputs.upToDateWhen { false }
    doFirst {
        args = ['--replace'] + fileTree('src').include('**/*.java').files.collect { it.absolutePath }
    }
}
